    <title>Binary Agents</title>
    <script>
        function binaryAgent(str) {
        const arrayNumbersStr = str.split(" ");
        
        const arrayNumbersDecimal = arrayNumbersStr.map(n => "0b" + n);
        console.log(arrayNumbersDecimal);
        const arrayNumbersDecimalInt = arrayNumbersDecimal.map(n => Number(n));
        console.log(arrayNumbersDecimalInt);
        const arrayDecimalToCharacters = arrayNumbersDecimalInt.map(c => String.fromCharCode(c));
        console.log(arrayDecimalToCharacters.join(""));
        return arrayDecimalToCharacters.join("");
        
        
        
        
            
            
        }

        binaryAgent("01000001 01110010 01100101 01101110 00100111 01110100 00100000 01100010 01101111 01101110 01100110 01101001 01110010 01100101 01110011 00100000 01100110 01110101 01101110 00100001 00111111");
    </script>
