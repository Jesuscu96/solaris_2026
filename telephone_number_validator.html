<!DOCTYPE html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telephone Number Validator</title>
    <script>
        function telephoneCheck(str) {

            const strWithoutSpacesHyphen = str
                .split("")
                .reduce((acc, v) => v !== " " && v !== "-" ? acc + v : acc, "");
            //
            const numbersOfparentheses = strWithoutSpacesHyphen
                .split("")
                .filter(v => v == "(" || v == ")");

            const strWithoutSpacesHyphenParenthess = strWithoutSpacesHyphen
                .split("")
                .filter(v => v !== "(" && v !== ")")
                .join("");

            const isNumber = strWithoutSpacesHyphenParenthess
                .split("")
                .filter(v => isNaN(v));

            const numberHyphens = str
                .split("")
                .filter(v => v == "-");
            
            //validate parentheses
            if (numbersOfparentheses.length !== 2 && numbersOfparentheses.length !== 0 || (str[0] == "(" && str[str.length - 1] == ")")) return false;
            
            //validate the length of the number
            if ((strWithoutSpacesHyphenParenthess[0] != 1 && strWithoutSpacesHyphenParenthess.length == 11) || (strWithoutSpacesHyphenParenthess[0] == 1 && strWithoutSpacesHyphenParenthess.length == 10) || strWithoutSpacesHyphenParenthess.length <= 9 || strWithoutSpacesHyphenParenthess.length >= 12) return false;
            
            //validate special characters and hyphens
            if (isNumber.length > 0 || numberHyphens.length >= 3 || str[0] == "-" ) return false;

            return true;

        }
        console.log(telephoneCheck("1 (555) 555-5555"));
