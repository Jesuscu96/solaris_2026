<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arguments Optional</title>
    <script>
        function addTogether(...args) {
            //console.log(args.length);
            if(typeof(args[0]) !== "number") return undefined 
            if (args.length > 1) {
                const sum = args.reduce((acc, elem) => {
                    if (typeof (elem) === "number") return acc += elem;
                    return undefined;
                }, 0)
                if (typeof (sum) === "number" && sum >= 0) return sum;
                return undefined;
            }
            return function sum (num2) {
                if(typeof(num2) !== "number") return undefined;
                return args[0] + num2;
            }

        }
        console.log(addTogether(5)(3));

    </script>
</head>
