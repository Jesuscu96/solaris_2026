<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roman Numeral Converter</title>
    <script>
        function convertToRoman(num) {
            const romanNumerals = [
                ["M", 1000],
                ["CM", 900],
                ["D", 500],
                ["CD", 400],
                ["C", 100],
                ["XC", 90],
                ["L", 50],
                ["XL", 40],
                ["X", 10],
                ["IX", 9],
                ["V", 5],
                ["IV", 4],
                ["I", 1]
            ];
            const filterNumbers = romanNumerals.filter(([v1, v2]) => v2 <= num);
            const sumNumbersArray = filterNumbers.reduce((acc, [v1, v2], index) => {
                
                if (index == 0) {
                    if (num >= (v2 * 3)) {
                        return acc = [...acc, [v1 + v1 + v1, v2 * 3]];
                    }
                    else if (num >= (v2 * 2)) {
                        return acc = [...acc, [v1 + v1, v2 * 2]];
                    } else if (num >= v2) {
                        return acc = [...acc, [v1, v2]];
                    }
                }

                else {
                    const sumAcc = acc.reduce((acc, [e1, e2]) => {
                        return acc += e2;
                    }, 0);

                    if (num >= ((v2 * 3) + sumAcc)) {
                        return acc = [...acc, [v1 + v1 + v1, v2 * 3]];
                    }
                    else if (num >= ((v2 * 2) + sumAcc)) {
                        return acc = [...acc, [v1 + v1, v2 * 2]];
                    } else if (num >= (v2 + sumAcc)) {
                        return acc = [...acc, [v1, v2]];
                    }
                    return acc;
                }
                return acc;


            }, []);

            const sumNumbersRoman = sumNumbersArray.reduce((acc, [e1, e2]) => {
                return acc += e1;
            }, "");
            
            return sumNumbersRoman;
            

        }

        convertToRoman(36);
    </script>
</head>
