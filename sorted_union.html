<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorted Union</title>
    <script>
        function uniteUnique(...args) {
            const flattenArr = args.flat(Infinity);        
            const uniqueArr = [...new Set(flattenArr)];
            return uniqueArr;
        }

        uniteUnique([1, 3, 2], [5, 2, 1, 4], [2, 1]);
    </script>
</head>
