<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reverse_a_String</title>
    <script>
        function reverseString(str) {
            const strReverse =  str.split("").reverse().join("");
            return strReverse;
        }

        reverseString('hello');
        console.log(reverseString('hello'));
        
    </script>
</head>
