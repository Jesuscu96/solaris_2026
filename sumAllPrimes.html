<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sum All Primes</title>
    <script>
        function sumPrimes(num) {

            const isPrime = (n, divisor = 2) => {
                if (n < 2) return false;
                if (divisor > Math.sqrt(n)) return true;
                if (n % divisor === 0) return false;
                return isPrime(n, divisor + 1);
            };

            const sumRecursive = (n, acc = 0) => {
                if (n < 2) return acc;
                return sumRecursive(n - 1, isPrime(n) ? acc + n : acc);
            };

            return sumRecursive(num);
        }

       
        console.log(sumPrimes(977));
    </script>
</head>
