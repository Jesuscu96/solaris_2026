<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smallest Common Multiple</title>
    <script>

        function smallestCommons(arr) {
            const arrOrder = [...arr].sort((a, b) => a - b);



            const mcd = (a, b) => {
                if (a <= 0) return b;
                if (b <= 0) return a;
                const division = a % b;
                return mcd(b, division);
            }
            const mcm = (a, b) => (a * b) / mcd(a, b);

            const numbersD = Array.from(
                { length: arrOrder[1] - arrOrder[0] + 1 },
                (_, i) => arrOrder[0] + i
            );

            return numbersD.reduce((acc, val) => mcm(acc, val));


        }
        console.log(smallestCommons([1, 5]));

    </script>
</head>
