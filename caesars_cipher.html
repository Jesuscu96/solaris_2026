<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caesars Cipher</title>
    <script>
        /* const array = String.fromCodePoint(90);
        console.log(array); */
        function rot13(str) {
            
            const regex = /[A-Z]/;
            const strArray = str.split("");
                       
            const strTranslatedPart2 = (numLetter,  numSubt) => {
                if(numLetter < 90 && numSubt > 0 ) {
                    numLetter++;
                    numSubt--;
                    return strTranslatedPart2(numLetter,  numSubt);
                }
                else if (numSubt > 0) {
                    numSubt--;
                    return strTranslatedPart2(65,  numSubt);
                }
                else if (numSubt === 0) {                    
                    return String.fromCodePoint(numLetter);
                }
            }
            const strTranslatedPart1 = strArray.reduce((acc, elem) => {
                if(regex.test(elem)) {
                    const letter = strTranslatedPart2(elem.charCodeAt(0),  13);
                    return acc += letter;
                }
                return acc += elem;
                
            }, "")
            return strTranslatedPart1;
        }
        
        
        console.log(rot13("SERR PBQR PNZC"));
        
    </script>
